name = "strawberry-rankings-api"
main = "src/index.ts"
compatibility_date = "2026-07-05"

[observability]
enabled = true
head_sampling_rate = 1

[version_metadata]
binding = "CF_VERSION_METADATA"

[triggers]
crons = ["*/15 * * * *"]

[vars]
ALLOWED_ORIGINS = "https://toyo1621.github.io,http://localhost:3000,http://localhost:8081,http://localhost:19006"
WEB_APP_URL = "https://toyo1621.github.io/StrawberryApp"

[[d1_databases]]
binding = "DB"
database_name = "strawberry-rankings"
database_id = "d0174a55-3491-496b-a9ad-be050121fbb2"
migrations_dir = "migrations"
