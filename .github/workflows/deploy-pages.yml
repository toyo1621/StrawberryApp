name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  release-api:
    uses: ./.github/workflows/deploy-worker.yml
    secrets: inherit

  build:
    needs: release-api
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality checks
        run: npm run check && npm run doctor

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: End-to-end and accessibility tests
        run: npm run test:e2e

      - name: Validate production configuration
        run: test -n "$EXPO_PUBLIC_RANKINGS_API_URL"
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL || secrets.EXPO_PUBLIC_RANKINGS_API_URL }}

      - name: Wait for compatible rankings API
        run: npm run wait:rankings-api
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL || secrets.EXPO_PUBLIC_RANKINGS_API_URL }}
          EXPECTED_RELEASE_ID: ${{ github.sha }}

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL || secrets.EXPO_PUBLIC_RANKINGS_API_URL }}
          EXPO_PUBLIC_RELEASE_ID: ${{ github.sha }}
          REQUIRE_PRODUCTION_RELEASE_ID: 'true'

      - name: Check web performance budget
        run: npm run check:web-build
        env:
          EXPO_PUBLIC_RELEASE_ID: ${{ github.sha }}

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: web-build

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Verify deployed web app
        run: node scripts/smoke-web.mjs
        env:
          WEB_URL: ${{ needs.deploy.outputs.page_url }}
          EXPECTED_RELEASE_ID: ${{ github.sha }}

      - name: Verify production rankings API
        run: node scripts/smoke-rankings-api.mjs
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL || secrets.EXPO_PUBLIC_RANKINGS_API_URL }}
          EXPECTED_RELEASE_ID: ${{ github.sha }}

      - name: Verify web and API release consistency
        run: npm run smoke:release
        env:
          WEB_URL: ${{ needs.deploy.outputs.page_url }}
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL || secrets.EXPO_PUBLIC_RANKINGS_API_URL }}
