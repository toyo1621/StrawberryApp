name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality checks
        run: npm run check

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end and accessibility tests
        run: npm run test:e2e

      - name: Validate production configuration
        run: test -n "$EXPO_PUBLIC_RANKINGS_API_URL"
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL || secrets.EXPO_PUBLIC_RANKINGS_API_URL }}

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL || secrets.EXPO_PUBLIC_RANKINGS_API_URL }}

      - name: Check web performance budget
        run: npm run check:web-build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web-build

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify deployed web app
        run: node scripts/smoke-web.mjs
        env:
          WEB_URL: ${{ needs.deploy.outputs.page_url }}

      - name: Verify production rankings API
        run: node scripts/smoke-rankings-api.mjs
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL || secrets.EXPO_PUBLIC_RANKINGS_API_URL }}
