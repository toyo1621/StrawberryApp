name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static, unit, migration, and dependency checks
        run: npm run check

      - name: Verify Expo project health
        run: npm run doctor

      - name: Compile iOS and Android production bundles
        run: npm run build:native-bundles

      - name: Enforce native bundle budgets
        run: npm run check:native-build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: End-to-end, responsive, accessibility, and performance tests
        run: npm run test:e2e

      - name: Build production web app
        run: npm run build:web
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL }}

      - name: Enforce web build budgets
        run: npm run check:web-build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run --config worker/wrangler.toml

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-diagnostics
          path: |
            .tmp/playwright-results
            .tmp/playwright-report
          if-no-files-found: ignore
          retention-days: 7
