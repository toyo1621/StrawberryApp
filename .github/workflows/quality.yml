name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static, unit, migration, and dependency checks
        run: npm run check

      - name: Verify Expo project health
        run: npx expo-doctor

      - name: Compile iOS and Android production bundles
        run: npm run build:native-bundles

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end, responsive, accessibility, and performance tests
        run: npm run test:e2e

      - name: Build production web app
        run: npm run build:web
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: ${{ vars.EXPO_PUBLIC_RANKINGS_API_URL }}

      - name: Enforce web build budgets
        run: npm run check:web-build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run --config worker/wrangler.toml

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-diagnostics
          path: |
            .tmp/playwright-results
            .tmp/playwright-report
          if-no-files-found: ignore
          retention-days: 7
