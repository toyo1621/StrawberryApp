name: Monitor Production

on:
  schedule:
    - cron: "2,17,32,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: production-monitor
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Check web app
        run: node scripts/smoke-web.mjs
        env:
          WEB_URL: https://toyo1621.github.io/StrawberryApp

      - name: Check rankings API and database
        run: node scripts/smoke-rankings-api.mjs
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: https://strawberry-rankings-api.toyo1621.workers.dev

  alert:
    if: failure()
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      ALERT_WEBHOOK_URL: ${{ secrets.MONITOR_ALERT_WEBHOOK_URL }}
    steps:
      - name: Open or update production incident
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create production-monitor --repo "$REPOSITORY" --color B91C1C --description "Automated production monitor incident" --force
          issue_number="$(gh issue list --repo "$REPOSITORY" --label production-monitor --state open --json number --jq '.[0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --repo "$REPOSITORY" --body "Production monitoring failed again: $RUN_URL"
          else
            gh issue create --repo "$REPOSITORY" --label production-monitor --title "Production monitoring failed" --body "The 15-minute web/API smoke check failed. Investigate the run: $RUN_URL"
          fi

      - name: Notify external incident webhook
        if: env.ALERT_WEBHOOK_URL != ''
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body --retry 2 --max-time 10 \
            -H 'content-type: application/json' \
            --data "$(jq -n --arg status failure --arg runUrl "$RUN_URL" '{service:"StrawberryApp",status:$status,runUrl:$runUrl}')" \
            "$ALERT_WEBHOOK_URL"

  resolve:
    if: success()
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      ALERT_WEBHOOK_URL: ${{ secrets.MONITOR_ALERT_WEBHOOK_URL }}
    steps:
      - name: Close recovered production incident
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          issue_number="$(gh issue list --repo "$REPOSITORY" --label production-monitor --state open --json number --jq '.[0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --repo "$REPOSITORY" --body "Production monitoring recovered: $RUN_URL"
            gh issue close "$issue_number" --repo "$REPOSITORY" --reason completed
          fi

      - name: Notify external recovery webhook
        if: env.ALERT_WEBHOOK_URL != ''
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body --retry 2 --max-time 10 \
            -H 'content-type: application/json' \
            --data "$(jq -n --arg status recovered --arg runUrl "$RUN_URL" '{service:"StrawberryApp",status:$status,runUrl:$runUrl}')" \
            "$ALERT_WEBHOOK_URL"
