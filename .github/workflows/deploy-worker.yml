name: Deploy Rankings Worker

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rankings-worker-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Worker
        run: npm run typecheck:worker && npm run test:worker && npx wrangler deploy --dry-run --config worker/wrangler.toml

      - name: Capture D1 restore point
        id: restore-point
        shell: bash
        run: |
          set -euo pipefail
          restore_json="$(npx wrangler d1 time-travel info strawberry-rankings --config worker/wrangler.toml --json)"
          bookmark="$(jq -er 'if type == "array" then .[0].bookmark else .bookmark end' <<<"$restore_json")"
          echo "bookmark=$bookmark" >> "$GITHUB_OUTPUT"
          {
            echo "### D1 restore point"
            echo "- Bookmark: \`$bookmark\`"
            echo "- Captured before migration for commit: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Capture ranking count before migration
        id: ranking-count-before
        shell: bash
        run: |
          set -euo pipefail
          table_json="$(npx wrangler d1 execute strawberry-rankings --remote --config worker/wrangler.toml --command "SELECT COUNT(*) AS present FROM sqlite_master WHERE type = 'table' AND name = 'rankings'" --json)"
          table_present="$(jq -er 'if type == "array" then .[0].results[0].present else .results[0].present end' <<<"$table_json")"

          if [[ "$table_present" == "1" ]]; then
            count_json="$(npx wrangler d1 execute strawberry-rankings --remote --config worker/wrangler.toml --command "SELECT COUNT(*) AS total FROM rankings" --json)"
            ranking_count="$(jq -er 'if type == "array" then .[0].results[0].total else .results[0].total end' <<<"$count_json")"
          else
            ranking_count=0
          fi

          echo "count=$ranking_count" >> "$GITHUB_OUTPUT"
          echo "- Ranking rows before migration: $ranking_count" >> "$GITHUB_STEP_SUMMARY"

      - name: Apply D1 migrations
        run: npm run d1:migrate

      - name: Verify ranking count after migration
        shell: bash
        env:
          RANKING_COUNT_BEFORE: ${{ steps.ranking-count-before.outputs.count }}
        run: |
          set -euo pipefail
          count_json="$(npx wrangler d1 execute strawberry-rankings --remote --config worker/wrangler.toml --command "SELECT COUNT(*) AS total FROM rankings" --json)"
          ranking_count_after="$(jq -er 'if type == "array" then .[0].results[0].total else .results[0].total end' <<<"$count_json")"
          echo "- Ranking rows after migration: $ranking_count_after" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$ranking_count_after" != "$RANKING_COUNT_BEFORE" ]]; then
            echo "Ranking row count changed during migration: $RANKING_COUNT_BEFORE -> $ranking_count_after" >&2
            exit 1
          fi

      - name: Enable D1 global read replication
        run: npm run d1:enable-read-replication
        env:
          D1_DATABASE_ID: d0174a55-3491-496b-a9ad-be050121fbb2

      - name: Deploy Worker
        run: npm run worker:deploy -- --tag "$GITHUB_SHA" --message "GitHub Actions run $GITHUB_RUN_ID"

      - name: Wait for deployed API release
        run: npm run wait:rankings-api
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: https://strawberry-rankings-api.toyo1621.workers.dev
          EXPECTED_API_VERSION: '4'
          EXPECTED_RELEASE_ID: ${{ github.sha }}
          API_WAIT_ATTEMPTS: '24'
          API_WAIT_INTERVAL_MS: '5000'
          API_WAIT_CONSECUTIVE_SUCCESSES: '3'

      - name: Verify production API
        run: npm run smoke:rankings-api
        env:
          EXPO_PUBLIC_RANKINGS_API_URL: https://strawberry-rankings-api.toyo1621.workers.dev
          EXPECTED_RELEASE_ID: ${{ github.sha }}

      - name: Write recovery instructions
        if: always() && steps.restore-point.outputs.bookmark != ''
        env:
          RESTORE_BOOKMARK: ${{ steps.restore-point.outputs.bookmark }}
        run: |
          {
            echo "### Recovery command"
            echo '```sh'
            echo "npx wrangler d1 time-travel restore strawberry-rankings --config worker/wrangler.toml --bookmark $RESTORE_BOOKMARK"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
